<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiquiConnect - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">
    <div th:replace="~{fragments/header :: header-principal}"></div>

    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-3 d-none d-lg-block p-0">
                <div th:replace="~{fragments/sidebar :: sidebar-principal}"></div>
            </div>

            <main class="col-12 col-lg-9 p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div>
                        <h1 class="fw-black display-5 mb-1">Tablón</h1>
                        <p class="text-muted">Avisos del Recinto de Siquirres</p>
                    </div>
                    <a th:href="@{/noticias/nueva}" class="btn btn-dark rounded-pill px-4 py-2 fw-bold shadow-sm">
                        <i class="bi bi-plus-lg me-2"></i> NUEVA POST
                    </a>
                </div>

                <div class="row g-4">
                    <div class="row g-4" id="listaPublicaciones"></div>
                </div>
            </main>
        </div>
    </div>
<script th:src="@{/js/publicaciones.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            cargarPublicaciones();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
