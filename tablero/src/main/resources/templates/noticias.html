<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiquiConnect - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">
    <div th:replace="~{fragments/header :: header-principal}"></div>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar oculto en móviles -->
            <div class="col-lg-3 d-none d-lg-block p-0">
                <div th:replace="~{fragments/sidebar :: sidebar-principal}"></div>
            </div>

            <!-- Contenido Principal -->
            <main class="col-12 col-lg-9 p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div>
                        <h1 class="fw-black display-5 mb-1">Tablón</h1>
                        <p class="text-muted">Avisos del Recinto de Siquirres</p>
                    </div>
                    <a th:href="@{/noticias/nueva}" class="btn btn-dark rounded-pill px-4 py-2 fw-bold shadow-sm">
                        <i class="bi bi-plus-lg me-2"></i> NUEVA POST
                    </a>
                </div>

                <div class="row g-4">

                    <div class="row g-4" id="listaPublicaciones"></div>
                </div>
            </main>
        </div>
    </div>

    <script>

        function formatearFecha(fechaString) {
            if (!fechaString) return "";
            const fecha = new Date(fechaString);
            return fecha.toLocaleString('es-ES', {
                day: '2-digit',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });
        }

        function cargarPublicaciones() {
            fetch('http://localhost:8080/publicaciones')
                .then(response => response.json())
                .then(data => {
                    console.log("DATA:", data);
                    const list = document.getElementById('listaPublicaciones');
                    list.innerHTML = '';
                    data.forEach(noticia => {
                        const div = document.createElement('div');
                        div.classList.add('publisUbication', 'col-12', 'col-md-6', 'col-lg-6');

                        const fechaLimpia = formatearFecha(noticia.fechaPublicacion);
                        const contenidoCard = `
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden card-hover">
            ${noticia.imgUrl ? `
                <div class="position-relative">
                    <img src="${noticia.imgUrl}" class="card-img-top" >
                    <span class="position-absolute top-0 end-0 m-3 badge bg-white text-dark rounded-pill shadow-sm">
                        ${noticia.category.nombre}
                    </span>
                </div>` : `
                <div class="p-3 pb-0">
                    <span class="badge bg-light text-dark rounded-pill">
                        ${noticia.category.nombre}
                    </span>
                </div>`
                            }
            <div class="card-body p-4 d-flex flex-column">
                <h5 class="fw-bold mb-2">${noticia.titulo}</h5>
                <p class="text-secondary small mb-3" style="max-height: 60px; overflow: hidden;">
                    ${noticia.contenido}
                </p>
                <a href="#" class="ver-mas text-primary small fw-bold mb-4">Leer más</a>
                
                <div class="d-flex align-items-center justify-content-between mt-auto pt-3 border-top">
                    <div class="d-flex align-items-center">
                        <div class="avatar-circle me-2" style="width: 35px; height: 35px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #6c757d; color: white;">
                            ${noticia.user.imgUrl ?
                                `<img src="${noticia.user.imgUrl}" style="width: 100%; height: 100%; object-fit: cover;">` :
                                `<span>${noticia.user.nombre.substring(0, 1).toUpperCase()}</span>`
                            }
                        </div>
                        <div class="d-flex flex-column">
                            <small class="fw-bold text-dark" style="line-height: 1.2;">${noticia.user.nombre}</small>
                            <small class="text-muted" style="font-size: 0.7rem;">${fechaLimpia}</small>
                        </div>
                    </div>
                    <i class="bi bi-bookmark-plus fs-5 text-muted" style="cursor: pointer;"></i>
                </div>
            </div>
        </div>
    `;

                        div.innerHTML = contenidoCard;
                        list.appendChild(div);
                    });



                    console.log('Publicaciones:', data);
                })
                .catch(error => console.error('Error al cargar publicaciones:', error));
        }

    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            cargarPublicaciones();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
