<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiquiConnect - Login</title>
    <!-- Google Fonts -->
    <link rel="stylesheet" th:href="@{/css/styleLogin.css}">
</head>

<body>
    <div class="login-container shadow-lg">
        <!-- Logo del proyecto -->
        <div class="text-center mb-4">
            <img th:src="@{/images/logo.png}" alt="Logo SiquiConnect" class="login-logo">
        </div>

        <form id="loginForm">
            <h2 class="fw-black text-center mb-4">¡Bienvenido!</h2>
            
            <div class="input-group">
                <label for="correo" class="fw-bold">Correo Institucional</label>
                <input type="text" id="correo" name="correo" placeholder="usuario@ejemplo.com" required>
            </div>
            
            <div class="input-group">
                <label for="password" class="fw-bold">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary-siqui">INGRESAR</button>
        </form>

        <div class="divider"><span>o</span></div>

        <div class="text-center">
            <p class="small text-muted mb-2">¿No tienes cuenta?</p>
            <button onclick="window.location.href='/register'" class="btn-secondary-siqui">
                REGISTRARSE
            </button>
        </div>
    </div>

    <script>

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;

            fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ correo, password })
            })
                .then(res => {
                    if (!res.ok) throw new Error("Login falló");
                    return res.json();
                })
                .then(data => {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/';
                })
                .catch(err => console.error(err));
        });

    </script>
</body>

</html>
