<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <aside th:fragment="sidebar-principal" class="sidebar-container border-end bg-white"
        style="width: 280px; min-height: 100vh;">
        <div class="p-4 position-sticky" style="top: 80px;">
            <div class="mb-4">
                <a th:href="@{/perfil}"
                    class="d-flex align-items-center text-decoration-none p-3 rounded-4 bg-light border hover-sidebar">
                    <div class="avatar-circle bg-primary text-white me-3 shadow-sm"
                        style="width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                        <span th:text="${usuario != null ? #strings.substring(usuario.nombre, 0, 1) : 'U'}">U</span>
                    </div>
                    <div class="overflow-hidden">
                        <p class="mb-0 fw-bold text-dark text-truncate"
                            th:text="${usuario != null ? usuario.nombre : 'Invitado'}">Nombre</p>
                        <small class="text-muted">Mi Perfil</small>
                    </div>
                </a>
            </div>

            <div class="nav flex-column gap-1">

                <a class="nav-link d-flex align-items-center p-3 rounded-3 text-dark fw-bold border-start border-4 border-primary bg-primary bg-opacity-10"
                    th:href="@{/}">
                    <i class="bi bi-grid-fill me-3"></i> TABLÓN
                </a>

                <div class="mt-4 mb-2 ps-3 text-uppercase text-muted fw-bold small" style="letter-spacing: 1px;">
                    Categorías</div>

                <div id="listaCategorias"></div>

                <script>

                    function cargarCategorias() {
                        fetch('/categories')
                            .then(response => response.json())
                            .then(data => {
                                const list = document.getElementById('listaCategorias');
                                list.innerHTML = '';
                                data.forEach(cat => {
                                    const div = document.createElement('div');
                                    div.classList.add('catUbication');

                                    const contenido = `
                                <button onclick="cargarPublicacionesCategoria(${cat.id})"
                                    class="nav-link d-flex align-items-center p-3 rounded-3 text-secondary hover-sidebar border-0 bg-transparent w-100 text-start">
                                    <i class="bi bi-tag me-3"></i>
                                    <span >${cat.nombre}</span>
                                </button>
                                `;

                                    div.innerHTML = contenido;
                                    list.appendChild(div);

                                });
                            })
                            .catch(error => {
                                console.error('Error al cargar categorías:', error);
                            });
                    }



                </script>

                <div class="mt-4 pt-3 border-top">
                    <div id="seccionAdmin" style="display: none;">
                        <a class="nav-link d-flex align-items-center p-3 text-muted" href="/usuarios">
                            <i class="bi bi-people me-3"></i> Usuarios
                        </a>
                        <a class="nav-link d-flex align-items-center p-3 text-muted" href="/categorias">
                            <i class="bi bi-tag me-3"></i> Categorías
                        </a>
                    </div>
                </div>

                <script>
                    document.addEventListener('DOMContentLoaded', function () {
                        const token = localStorage.getItem('token');
                        if (token) {
                            const payload = JSON.parse(atob(token.split('.')[1]));

                            if (payload.roles && payload.roles.includes('ADMIN')) {
                                document.getElementById('seccionAdmin').style.display = 'block';
                            }
                        }
                    });
                </script>

                <script>
                    document.addEventListener('DOMContentLoaded', function () {
                        cargarCategorias();
                    });
                </script>
            </div>
        </div>
    </aside>
</body>

</html>
