<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Siqui-Tablero | Noticia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="d-flex">
        <div th:replace="~{fragmentos :: sidebar}"></div>
        <main class="main-content flex-grow-1">
            <div class="container" style="max-width: 900px;">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/noticias}">Inicio</a></li>
                        <li class="breadcrumb-item active" th:text="${publicacion.category.nombre}">Categoría</li>
                    </ol>
                </nav>
                
                <img th:src="${publicacion.imgUrl}" class="img-fluid rounded shadow-sm mb-4" style="width: 100%; max-height: 400px; object-fit: cover;">
                
                <h1 class="fw-bold mb-3" th:text="${publicacion.titulo}"></h1>
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                    <span class="text-muted">Publicado por: <strong th:text="${publicacion.user.username}"></strong></span>
                    <button class="btn btn-outline-secondary border-0">
                        <i class="bi bi-bookmark"></i>
                    </button>
                </div>
                
                <div class="content-body fs-5" style="line-height: 1.8;">
                    <p th:text="${publicacion.contenido}"></p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
