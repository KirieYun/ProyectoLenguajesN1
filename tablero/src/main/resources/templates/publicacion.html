<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Publicación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: sidebar-principal}"></div>

        <main class="main-content flex-grow-1">
            <div class="container" style="max-width: 700px;">
                <h2 class="fw-bold mb-4">Nueva Publicación</h2>
                
                <form th:action="@{/noticias/guardar}" method="post" enctype="multipart/form-data" class="card p-4 shadow-sm border-0">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Título</label>
                        <input type="text" name="titulo" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Contenido</label>
                        <textarea name="contenido" class="form-control" rows="5" required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Subir Imagen</label>
                        <input type="file" name="file" class="form-control" accept="image/*">
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/}" class="btn btn-light">Cancelar</a>
                        <button type="submit" class="btn btn-publicar">POSTEAR</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
