<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Crear Publicación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: sidebar-principal}"></div>

        <main class="main-content flex-grow-1">
            <div class="container" style="max-width: 700px;">
                <h2 class="fw-bold mb-4">Nueva Publicación</h2>

                <form onsubmit="event.preventDefault();" class="card p-4 shadow-sm border-0">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Título</label>
                        <input type="text" id="titulo" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Contenido</label>
                        <textarea id="contenido" class="form-control" rows="5" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Categoría</label>
                        <select class="form-select" required id="categoryId">
                            <option value="" Selected disabled>Seleccionar categoría</option>

                            <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Subir Imagen</label>
                        <input type="file" id="file" name="file" class="form-control" accept="image/*">
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/}" class="btn btn-light">Cancelar</a>
                        <button type="button" onclick="publicar()" class="btn btn-publicar">POSTEAR</button>
                    </div>
                </form>
            </div>
        </main>
    </div>


    <script>
        function publicar() {

            const titulo = document.getElementById('titulo').value;
            if (titulo.trim() === '') {
                alert('Ingresa un título antes de publicar.');
                return;
            }

            const contenido = document.getElementById('contenido').value;
            if (contenido.trim() === '') {
                alert('Ingresa un contenido antes de publicar.');
                return;
            }

            const categoryId = document.getElementById('categoryId').value;
            if (!categoryId) {
                alert('Selecciona una categoría antes de publicar.');
                return;
            }

            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];

            const formData = new FormData();
            formData.append('titulo', titulo);
            formData.append('contenido', contenido);
            formData.append('categoryId', categoryId);

            if (file) {
                formData.append('file', file);
            }

            fetch('/publicaciones/add', {
                method: 'POST',
                body: formData
            })
                .then(response => {
                    if (response.ok) {
                        window.location.href = '/';
                    } else {
                        alert('Error al publicar');
                    }
                });
        }
    </script>

    

</body>

</html>
