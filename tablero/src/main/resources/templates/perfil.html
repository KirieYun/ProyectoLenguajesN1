<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - SiquiConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

<body class="bg-light">

            </div>

            <div class="ms-md-4">

            </div>
        </div>
    </div>



    <!-- Pestañas -->
    <ul class="nav nav-pills mb-4 justify-content-center justify-content-md-start gap-2">
        <li class="nav-item"><a class="nav-link active rounded-pill px-4 fw-bold" href="#">MIS POSTS</a></li>
        <li class="nav-item"><a class="nav-link bg-white border rounded-pill px-4 text-muted fw-bold"
                href="#">GUARDADOS</a></li>
    </ul>

    <div id="listaMisPublicaciones" class="row g-4"></div>


    </div>
    </div>
    </div>

    <script th:src="@{/js/perfilDatos.js}"></script>
    <script th:src="@{/js/publicacionesPerfil.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            cargarMisPublicaciones();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
