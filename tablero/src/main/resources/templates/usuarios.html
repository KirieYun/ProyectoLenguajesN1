<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SiquiConnect - Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="d-flex" style="min-height: 100vh;">
        <div th:replace="~{fragments/sidebar :: sidebar-principal}"></div>

        <main class="flex-grow-1 p-5 main-content">
            <div class="container">
                <h2 class="fw-bold mb-5">Gestión de Usuarios</h2>
                
                <div class="card border rounded-0 shadow-sm">
                    <table class="table mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="p-3">USUARIO</th>
                                <th class="p-3">ROL</th>
                                <th class="p-3 text-center">ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody id="tablaUsuarios">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script th:src="@{/js/usuarios.js}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            cargarUsuarios();
        });

        function eliminarUsuario(id) {
            if (!confirm("¿Seguro que deseas eliminar este usuario?")) return;

            fetch(`http://localhost:8080/users/${id}`, {
                method: "DELETE"
            })
            .then(res => {
                if (!res.ok) throw new Error("Error al eliminar usuario");
                cargarUsuarios();
            })
            .catch(err => console.error(err));
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
