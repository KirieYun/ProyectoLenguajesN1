<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SiquiConnect - Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="d-flex" style="min-height: 100vh;">
        <div th:replace="~{fragments/sidebar :: sidebar-principal}"></div>

        <main class="flex-grow-1 p-5 main-content">
            <div class="container">
                <h2 class="fw-bold mb-5">Gestión de Usuarios</h2>
                
                <div class="card border rounded-0 shadow-sm">
                    <table class="table mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="p-3">USUARIO</th>
                                <th class="p-3">ROL ACTUAL</th>
                                <th class="p-3 text-center">ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="p-3 d-flex align-items-center">
                                    <div class="avatar-circle me-3" style="width:35px; height:35px;"></div>
                                    <span class="fw-bold">Admin_Siquirres</span>
                                </td>
                                <td class="p-3"><span class="badge bg-dark rounded-0">ADMIN</span></td>
                                <td class="p-3 text-center">
                                    <button class="btn btn-profile-edit btn-sm">CAMBIAR ROL</button>
                                </td>
                            </tr>
                            <tr>
                                <td class="p-3 d-flex align-items-center">
                                    <div class="avatar-circle me-3" style="width:35px; height:35px;"></div>
                                    <span class="fw-bold">Estudiante_01</span>
                                </td>
                                <td class="p-3"><span class="badge bg-secondary rounded-0">EDITOR</span></td>
                                <td class="p-3 text-center">
                                    <button class="btn btn-profile-edit btn-sm">CAMBIAR ROL</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
