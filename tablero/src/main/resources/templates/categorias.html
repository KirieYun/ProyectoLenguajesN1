<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Categorías</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-4">

<div class="container">

    <h2 class="mb-4">Gestión de Categorías</h2>

    <div class="card mb-4">
        <div class="card-body d-flex gap-2">
            <input type="text" id="nombreCategoria" class="form-control" placeholder="Nueva categoría">
            <button onclick="agregarCategoria()" class="btn btn-dark">Agregar</button>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table" id="tablaCategorias">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</div>

<script>

const API = "http://localhost:8080/categories";

function cargarCategorias() {
    fetch(API)
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector("#tablaCategorias tbody");
            tbody.innerHTML = "";

            data.forEach(cat => {
                tbody.innerHTML += `
                    <tr>
                        <td>${cat.id}</td>
                        <td>${cat.nombre}</td>
                        <td class="text-end">
                            <button class="btn btn-danger btn-sm"
                                onclick="eliminarCategoria(${cat.id})">
                                Eliminar
                            </button>
                        </td>
                    </tr>
                `;
            });
        });
}

function agregarCategoria() {
    const nombre = document.getElementById("nombreCategoria").value;

    if (!nombre) {
        alert("Escribe un nombre");
        return;
    }

    const formData = new FormData();
    formData.append("nombre", nombre);

    fetch('/categories/add', {
        method: 'POST',
        body: formData
    })
    .then(res => {
        if (!res.ok) throw new Error("Error al agregar");
        document.getElementById("nombreCategoria").value = "";
        cargarCategorias();
    })
    .catch(err => console.error(err));
}

function eliminarCategoria(id) {
    if (!confirm("¿Eliminar categoría?")) return;

    fetch(API + "/" + id, {
        method: "DELETE"
    })
    .then(() => cargarCategorias());
}

document.addEventListener("DOMContentLoaded", cargarCategorias);

</script>

</body>
</html>
